<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>luciaocr Web Engine</title>
    <script src="./ort.min.js"></script>
    <script src="./opencv.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      canvas {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <script type="module">
      import { init as paddleInit, ocr as paddleOCR } from "./esearch-ocr.js";

      window.Paddle = {
        init: paddleInit,
        recognize: paddleOCR,
      };

      window.dispatchEvent(new Event("paddleReady"));
    </script>

    <script>
      const ENGINE_SOURCE = "luciaocr-web-engine";
      const HOST_SOURCE = "luciaocr-web-sdk";
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let isOCRReady = false;
      let isInitializing = false;
      let ocrFunction = null;
      let hostOrigin = "*";
      let assetBaseUrl = new URL(".", window.location.href).href;

      function createAssetUrl(relativePath) {
        return new URL(relativePath, assetBaseUrl).href;
      }

      function postToHost(payload) {
        window.parent.postMessage(
          {
            source: ENGINE_SOURCE,
            ...payload,
          },
          hostOrigin
        );
      }

      function postProgress(message) {
        postToHost({
          type: "OCR_PROGRESS",
          message,
        });
      }

      async function requestText(relativePath, errorMessage) {
        const response = await fetch(createAssetUrl(relativePath));
        if (!response.ok) {
          throw new Error(errorMessage);
        }
        return response.text();
      }

      async function requestBlobUrl(relativePath, errorMessage) {
        const response = await fetch(createAssetUrl(relativePath));
        if (!response.ok) {
          throw new Error(errorMessage);
        }
        const blob = await response.blob();
        return URL.createObjectURL(blob);
      }

      async function initEngine(config = {}) {
        if (isOCRReady) {
          postToHost({ type: "OCR_READY" });
          return;
        }

        if (isInitializing) {
          return;
        }

        isInitializing = true;
        assetBaseUrl = config.assetBaseUrl
          ? new URL("./", config.assetBaseUrl).href
          : assetBaseUrl;

        try {
          if (window.ort && window.ort.env && window.ort.env.wasm) {
            window.ort.env.wasm.wasmPaths = assetBaseUrl;
          }

          postProgress("Loading OpenCV...");
          while (typeof cv === "undefined" || !cv.Mat) {
            await new Promise((resolve) => setTimeout(resolve, 100));
          }

          postProgress("Loading PaddleOCR...");
          while (typeof window.Paddle === "undefined") {
            await new Promise((resolve) => setTimeout(resolve, 100));
          }

          postProgress("Loading OCR dictionary...");
          const dictionary = await requestText(
            "models/ppocr_keys_v1.txt",
            "Failed to load OCR dictionary"
          );

          postProgress("Loading detection model...");
          const detBlobUrl = await requestBlobUrl(
            "models/ppocr_det.onnx",
            "Failed to load OCR detection model"
          );

          postProgress("Loading recognition model...");
          const recBlobUrl = await requestBlobUrl(
            "models/ppocr_rec.onnx",
            "Failed to load OCR recognition model"
          );

          const paddleResult = await window.Paddle.init({
            detPath: detBlobUrl,
            recPath: recBlobUrl,
            dic: dictionary,
            ort: ort,
            node: false,
            cv: cv,
          });

          ocrFunction = paddleResult.ocr;
          isOCRReady = true;
          isInitializing = false;

          postToHost({ type: "OCR_READY" });
        } catch (error) {
          isInitializing = false;
          postToHost({
            type: "OCR_ERROR",
            message: error.message || "Engine init failed",
          });
        }
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.crossOrigin = "anonymous";
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("Image load failed"));
          image.src = src;
        });
      }

      async function recognize(message) {
        const { requestId, imageSrc } = message;

        if (!isOCRReady || !ocrFunction) {
          postToHost({
            type: "OCR_ERROR",
            requestId,
            message: "Engine is not initialized",
          });
          return;
        }

        try {
          const startTime = Date.now();
          const image = await loadImage(imageSrc);

          const maxSize = 1200;
          let width = image.width;
          let height = image.height;

          if (width > maxSize || height > maxSize) {
            const ratio = Math.min(maxSize / width, maxSize / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }

          canvas.width = width;
          canvas.height = height;
          ctx.clearRect(0, 0, width, height);
          ctx.drawImage(image, 0, 0, width, height);

          const imageData = ctx.getImageData(0, 0, width, height);
          const result = await ocrFunction(imageData);
          const rawLines = Array.isArray(result.src) ? result.src : [];
          const lines = rawLines
            .map((item) => (typeof item === "string" ? item : item.text || ""))
            .filter(Boolean)
            .filter((line) => line.length <= 50)
            .filter((line) => {
              if (/[\u4e00-\u9fa5\d]/.test(line)) {
                return true;
              }
              if (line.length > 10) {
                return false;
              }
              return !/Sex|Date|Birth|Address|Name|Republic/i.test(line);
            });

          postToHost({
            type: "OCR_RESULT",
            requestId,
            duration: Date.now() - startTime,
            lines,
            text: lines.join("\n"),
          });
        } catch (error) {
          postToHost({
            type: "OCR_ERROR",
            requestId,
            message: error.message || "Recognition failed",
          });
        }
      }

      window.addEventListener("message", (event) => {
        const message = event.data;
        if (!message || message.source !== HOST_SOURCE) {
          return;
        }

        hostOrigin = event.origin || "*";

        if (message.type === "OCR_INIT") {
          initEngine(message.payload || {});
          return;
        }

        if (message.type === "OCR_RECOGNIZE") {
          recognize(message);
          return;
        }

        if (message.type === "OCR_DESTROY") {
          isOCRReady = false;
          isInitializing = false;
          ocrFunction = null;
        }
      });

      postToHost({ type: "OCR_FRAME_READY" });
    </script>
  </body>
</html>
